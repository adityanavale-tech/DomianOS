<!DOCTYPE html>
<html>

  <body style="background-image: url(./hollowpurple.png); background-size: cover; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; color: white;">
    <!--Top Bar-->

      style="display: flex;align-items: center;background-color: rgba(112, 112, 112, 0.7); padding: 10px; cursor: move; border-radius: 12px; font-weight: bold;">

      </div>

  <p>Inspired by Jujutsu Kaisen</p></div>
    <a 
style="color: white;"
href="https://github.com/adityanavale-tech/DomianOS/blob/main/README.md">README</a>

  style="color: white;"
  href="https://stardance.hackclub.com/projects/22470">Stardance Project</a>

        <div id="todoappicon" style="top: 500px;left: 200px;position: fixed;cursor: move;text-align: center; font-size: small; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">

        </div>

}, 1000);
